[build]
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline' https://sibforms.com; script-src 'self' 'unsafe-inline' https://sibforms.com; img-src 'self' data: https://sibforms.com; font-src 'self' https://assets.brevo.com; connect-src 'self' https://*.sibforms.com; form-action 'self' https://*.sibforms.com; frame-ancestors 'none'"
